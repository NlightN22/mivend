query PaymentDetail($id: ID!) {
    payment(id: $id) {
        id
        amount
        currencyCode
        channel
        status
        createdAt
        invoiceId
        orderId
        externalReference
        refunds {
            id
            amount
            status
            providerRefundId
            reason
            createdAt
        }
        disputes {
            id
            type
            status
            amount
            openedAt
        }
        processingEvents {
            stage
            occurredAt
            note
        }
        invoice {
            id
            status
        }
        order {
            id
            code
        }
        allocations {
            amount
            isAdvance
            invoice {
                id
                amount
                currencyCode
                status
                order {
                    id
                    code
                }
            }
        }
    }
}
