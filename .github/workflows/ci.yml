name: CI

on:
    push:
        branches: ['**']
    pull_request:
        branches: [main]

jobs:
    lint-and-typecheck:
        name: Lint & type check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm lint

            - name: Format check
              run: pnpm format:check

            - name: Type check (server)
              run: pnpm --filter server exec tsc --noEmit

            - name: Type check (storefront)
              run: pnpm --filter @mivend/storefront exec vue-tsc --noEmit

    unit-tests:
        name: Unit tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Run unit tests
              run: pnpm test

            # Contract tests (docs/testing-strategy.md's "Contract" level) need no DB/infra, so
            # they already run as part of `pnpm test` above — this step re-runs just that subset
            # for a distinctly labeled pass/fail in the Actions log, per the target CI pipeline
            # (lint -> ... -> unit -> integration -> component -> contract -> E2E smoke). A
            # dedicated job/service matrix isn't worth it for the one contract suite that exists
            # today (`plugin-sync`'s RabbitMQ envelope) — revisit if that count grows.
            - name: Run contract tests (subset of unit tests above, labeled separately)
              run: pnpm exec vitest run packages/plugins/sync/src/__tests__/contracts

            - name: Upload coverage
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage
                  path: coverage/
                  if-no-files-found: ignore
