name: Integration tests

on:
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    integration:
        name: Integration tests
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: mivend_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

            redis:
                image: redis:7
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

            rabbitmq:
                image: ghcr.io/nlightn22/mivend-rabbitmq:latest
                env:
                    RABBITMQ_DEFAULT_USER: mivend
                    RABBITMQ_DEFAULT_PASS: mivend
                ports:
                    - 5672:5672
                options: >-
                    --health-cmd "rabbitmq-diagnostics ping"
                    --health-interval 10s
                    --health-timeout 10s
                    --health-retries 10

        env:
            NODE_ENV: test
            TEST_DB_HOST: localhost
            TEST_DB_PORT: 5432
            TEST_DB_USER: postgres
            TEST_DB_PASSWORD: postgres
            TEST_DB_NAME: mivend_test
            REDIS_HOST: localhost
            REDIS_PORT: 6379
            RABBITMQ_URL: amqp://mivend:mivend@localhost:5672

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Build plugins
              run: pnpm build

            - name: Run integration tests
              run: pnpm --filter "{packages/**}" --no-bail test:integration

    # E2E tests require a running server + storefront — run locally via `make e2e`
    e2e:
        name: E2E tests (scaffolded)
        if: false
        needs: integration
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm --filter @mivend/e2e exec playwright install --with-deps chromium
            - run: make e2e
            - uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: playwright-report
                  path: packages/e2e/playwright-report/
