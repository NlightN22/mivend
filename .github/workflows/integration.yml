name: Integration tests

on:
    pull_request:
        branches: [main]
    workflow_dispatch:
        inputs:
            run_e2e_smoke:
                description: 'Run the E2E smoke job too (unverified in CI yet — see docs/testing-strategy.md)'
                type: boolean
                default: false

jobs:
    integration:
        name: Integration tests
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: mivend_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

            redis:
                image: redis:7
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

            rabbitmq:
                image: ghcr.io/nlightn22/mivend-rabbitmq:latest
                env:
                    RABBITMQ_DEFAULT_USER: mivend
                    RABBITMQ_DEFAULT_PASS: mivend
                ports:
                    - 5672:5672
                options: >-
                    --health-cmd "rabbitmq-diagnostics ping"
                    --health-interval 10s
                    --health-timeout 10s
                    --health-retries 10

        env:
            NODE_ENV: test
            TEST_DB_HOST: localhost
            TEST_DB_PORT: 5432
            TEST_DB_USER: postgres
            TEST_DB_PASSWORD: postgres
            TEST_DB_NAME: mivend_test
            REDIS_HOST: localhost
            REDIS_PORT: 6379
            RABBITMQ_URL: amqp://mivend:mivend@localhost:5672

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            # Integration tests only ever consume plugin (+ shared, + server) dist output —
            # manager and storefront are separate deployable apps neither test:integration nor
            # e2e-smoke's server/worker touch. `pnpm build` (unscoped `pnpm -r build`) used to run
            # here regardless, which meant an unrelated manager/storefront build break (real
            # incident: this literally happened — see git history around this comment) could fail
            # the whole integration job even though nothing it actually needs was affected.
            - name: Build plugins
              run: pnpm --filter '!@mivend/manager' --filter '!@mivend/storefront' -r build

            - name: Run integration tests
              run: pnpm --filter "{packages/**}" --no-bail test:integration

            # Component tests (docs/testing-strategy.md's "Component" level — a full
            # enqueue->claim->process->persist chain) already ran as part of the step above (same
            # `test:integration` script, same DB/infra, no reason to spin up a second Postgres/
            # Redis/RabbitMQ matrix for two files) — this re-runs just that subset for a
            # distinctly labeled pass/fail in the Actions log, per the target CI pipeline. Not
            # worth a dedicated job for the two component suites that exist today
            # (plugin-erp-import, plugin-reservation); revisit if that count grows.
            - name: Run component tests (subset of integration tests above, labeled separately)
              run: |
                  pnpm --filter @mivend/plugin-erp-import exec vitest run --config vitest.integration.config.ts component
                  pnpm --filter @mivend/plugin-reservation exec vitest run --config vitest.integration.config.ts component

    # Small critical-route subset (login, order creation — see docs/testing-strategy.md's "E2E
    # strategy"), not the full Playwright suite. Manual-trigger only for now
    # (workflow_dispatch with run_e2e_smoke=true) until its real runtime/flakiness in a fresh
    # GitHub-hosted runner (boots postgres/redis/rabbitmq/elasticsearch + server + worker +
    # storefront + manager natively) has been observed at least once — see AGENTS.md "Do not
    # include heavy E2E on every push without a time estimate."
    e2e-smoke:
        name: E2E smoke
        if: github.event_name == 'workflow_dispatch' && inputs.run_e2e_smoke
        needs: integration
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm --filter @mivend/e2e exec playwright install --with-deps chromium
            - run: bash infrastructure/scripts/ci-e2e-smoke.sh
            - uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: playwright-report
                  path: packages/e2e/playwright-report/
