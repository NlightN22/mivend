services:
    postgres-central:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: mivend_central
            POSTGRES_HOST_AUTH_METHOD: trust
        ports:
            - '5432:5432'
        volumes:
            - postgres-central-data:/var/lib/postgresql/data
            - ./init-db:/docker-entrypoint-initdb.d:ro
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 10s
            timeout: 5s
            retries: 5

    postgres-branch:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: mivend_branch
            POSTGRES_HOST_AUTH_METHOD: trust
        ports:
            - '5433:5432'
        volumes:
            - postgres-branch-data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        ports:
            - '6379:6379'
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5

    rabbitmq:
        image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-nlightn22}/mivend-rabbitmq:latest
        environment:
            RABBITMQ_DEFAULT_USER: mivend
            RABBITMQ_DEFAULT_PASS: mivend
        ports:
            - '5672:5672'
            - '15672:15672'
        healthcheck:
            test: ['CMD', 'rabbitmq-diagnostics', 'ping']
            interval: 10s
            timeout: 10s
            retries: 10

    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
        environment:
            - discovery.type=single-node
            - xpack.security.enabled=false
            - ES_JAVA_OPTS=-Xms512m -Xmx512m
        ports:
            - '9200:9200'
        volumes:
            - elasticsearch-data:/usr/share/elasticsearch/data
        healthcheck:
            test: ['CMD-SHELL', 'curl -sf http://localhost:9200/_cluster/health || exit 1']
            interval: 15s
            timeout: 10s
            retries: 10

    server:
        image: node:20-slim
        working_dir: /app
        command: node apps/server/dist/main.js
        volumes:
            - ../../:/app
        ports:
            - '3000:3000'
            - '3002:3002'
        environment:
            INSTANCE_TYPE: central
            INSTANCE_ID: central
            PORT: '3000'
            ADMIN_UI_PORT: '3002'
            NODE_ENV: development
            DB_HOST: postgres-central
            DB_PORT: '5432'
            DB_USERNAME: postgres
            DB_PASSWORD: postgres
            DB_NAME: mivend_central
            REDIS_HOST: redis
            REDIS_PORT: '6379'
            RABBITMQ_URL: amqp://mivend:mivend@rabbitmq:5672
            SUPERADMIN_USERNAME: superadmin
            SUPERADMIN_PASSWORD: superadmin
            ELASTICSEARCH_HOST: http://elasticsearch:9200
        depends_on:
            postgres-central:
                condition: service_healthy
            redis:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        profiles:
            - app

    storybook:
        image: nginx:alpine
        ports:
            - '6006:80'
        volumes:
            - ../../packages/ui-kit/storybook-static:/usr/share/nginx/html:ro
        profiles:
            - ui

volumes:
    postgres-central-data:
    postgres-branch-data:
    elasticsearch-data:
