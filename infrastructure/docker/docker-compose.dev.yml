services:
    # Two PostgreSQL instances simulate central hub and one branch locally
    postgres-central:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: mivend_central
        ports:
            - '5432:5432'
        volumes:
            - postgres-central-data:/var/lib/postgresql/data

    postgres-branch:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: mivend_branch
        ports:
            - '5433:5432'
        volumes:
            - postgres-branch-data:/var/lib/postgresql/data

    redis:
        image: redis:7-alpine
        ports:
            - '6379:6379'

    rabbitmq:
        image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-mivend}/mivend-rabbitmq:latest
        environment:
            RABBITMQ_DEFAULT_USER: mivend
            RABBITMQ_DEFAULT_PASS: mivend
        ports:
            - '5672:5672'
            - '15672:15672'

    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
        environment:
            - discovery.type=single-node
            - xpack.security.enabled=false
            - ES_JAVA_OPTS=-Xms512m -Xmx512m
        ports:
            - '9200:9200'
        volumes:
            - elasticsearch-data:/usr/share/elasticsearch/data

volumes:
    postgres-central-data:
    postgres-branch-data:
    elasticsearch-data:
