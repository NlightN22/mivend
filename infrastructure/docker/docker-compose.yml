services:
    server:
        image: ghcr.io/nlightn22/mivend-server:${IMAGE_TAG:-latest}
        environment:
            NODE_ENV: production
            DB_HOST: postgres
            DB_PORT: 5432
            DB_USERNAME: ${POSTGRES_USER:-postgres}
            DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
            DB_NAME: ${POSTGRES_DB:-mivend}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            INSTANCE_TYPE: ${INSTANCE_TYPE:-branch}
            PORT: 3000
            SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-superadmin}
            SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-superadmin}
        ports:
            - '3000:3000'
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        restart: unless-stopped

    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
            POSTGRES_DB: ${POSTGRES_DB:-mivend}
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        volumes:
            - redis-data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    rabbitmq:
        image: ghcr.io/nlightn22/mivend-rabbitmq:latest
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-mivend}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-mivend}
        volumes:
            - rabbitmq-data:/var/lib/rabbitmq
        healthcheck:
            test: ['CMD', 'rabbitmq-diagnostics', 'ping']
            interval: 10s
            timeout: 10s
            retries: 10
        restart: unless-stopped

volumes:
    postgres-data:
    redis-data:
    rabbitmq-data:
